# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Surekli Entegrasyon - Derle ve Test Et

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file Hesaplama/pom.xml
    - name: Jacoco Summary
      uses: jjmrocha/jacoco-summary@v1.1.1
      with:
        jacoco-csv-file: /Hesaplama/target/site/jacoco/jacoco.csv
    - name: Add coverage to PR
      uses: madrapps/jacoco-report@v1.7.2
      with:
        paths: ${{ github.workspace }}/Hesaplama/target/site/jacoco/jacoco.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 10
        min-coverage-changed-files: 20
